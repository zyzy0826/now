
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Now Page</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #fafafa; color: #333; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
    h1 { margin-bottom: 20px; text-align: center; }
    .timeline-container { position: relative; width: 90vw; max-width: 1000px; display: flex; align-items: center; }
    .timeline-track { position: absolute; top: 50%; left: 0; right: 0; border-top: 2px dashed #bbb; z-index: 1; }
    .nodes-wrapper { display: flex; gap: 60px; padding: 120px 40px; overflow-x: auto; scroll-behavior: smooth; z-index: 2; width: 100%; -ms-overflow-style: none; scrollbar-width: none; }
    .nodes-wrapper::-webkit-scrollbar { display: none; }
    .node-card { position: relative; background: white; padding: 15px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-decoration: none; color: inherit; min-width: 140px; text-align: center; transition: transform 0.2s, box-shadow 0.2s; flex-shrink: 0; border: 1px solid #eee; }
    .node-card:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    .node-date { font-size: 0.8em; color: #888; margin-bottom: 5px; }
    .node-title { font-weight: bold; font-size: 1.1em; }
    .node-card.current { border: 2px solid #ff6b6b; box-shadow: 0 0 15px rgba(255, 107, 107, 0.3); }
    .node-card.up { transform: translateY(-70px); }
    .node-card.up:hover { transform: translateY(-70px) scale(1.05); }
    .node-card.up::after { content: ''; position: absolute; left: 50%; bottom: -52px; height: 50px; border-left: 2px dashed #bbb; transform: translateX(-50%); }
    .node-card.up::before { content: ''; position: absolute; left: 50%; bottom: -56px; width: 10px; height: 10px; background: #bbb; border-radius: 50%; transform: translateX(-50%); }
    .node-card.down { transform: translateY(70px); }
    .node-card.down:hover { transform: translateY(70px) scale(1.05); }
    .node-card.down::after { content: ''; position: absolute; left: 50%; top: -52px; height: 50px; border-left: 2px dashed #bbb; transform: translateX(-50%); }
    .node-card.down::before { content: ''; position: absolute; left: 50%; top: -56px; width: 10px; height: 10px; background: #bbb; border-radius: 50%; transform: translateX(-50%); }
    .nav-btn { background: white; border: 1px solid #ddd; border-radius: 50%; width: 45px; height: 45px; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: absolute; top: 50%; transform: translateY(-50%); z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: 0.2s; color: #555; }
    .nav-btn:hover { background: #f0f0f0; }
    .nav-left { left: -20px; }
    .nav-right { right: -20px; }
  </style>
</head>
<body>
  <h1>✧ ₍ᐢ.ˬ.⑅ᐢ₎ʚଓ<br>Zuiyu's Now Page</h1>
  <div class="timeline-container">
    <button class="nav-btn nav-left" id="scroll-left">←</button>
    <div class="timeline-track"></div>
    <div class="nodes-wrapper" id="scroll-wrapper">
      
    <a href="2026-03-31-2026-03.html" class="node-card up archive">
      <div class="node-date">2026-03-31</div>
      <div class="node-title">尼豪！三月！再別悠閒空虛ㄉ自己！</div>
    </a>
  
    </div>
    <button class="nav-btn nav-right" id="scroll-right">∑</button>
  </div>
  <script>
    const wrapper = document.getElementById('scroll-wrapper');
    document.getElementById('scroll-left').addEventListener('click', () => { wrapper.scrollBy({ left: -300, behavior: 'smooth' }); });
    document.getElementById('scroll-right').addEventListener('click', () => { wrapper.scrollBy({ left: 300, behavior: 'smooth' }); });
  </script>
</body>
</html>
